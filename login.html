<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | UrbanAlert</title>

    <link rel="stylesheet" href="login.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="login-container">

    <h1>📡 UrbanAlert</h1>
    <p>Acceso para Administradores y Entidades</p>

    <form id="loginForm">

        <label>Correo electrónico</label>
        <input
            type="email"
            id="correo"
            placeholder="correo@urbanalert.pe"
            required
        >

        <label>Contraseña</label>
        <input
            type="password"
            id="password"
            placeholder="********"
            required
        >

        <button type="submit">
            Iniciar Sesión
        </button>

    </form>

</div>

<script src="login.js"></script>

</body>
</html>
